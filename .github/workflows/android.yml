name: Build APK

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      - name: Build APK
        run: |
          cd GizliGaleri
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: chavo-apk
          path: GizliGaleri/app/build/outputs/apk/debug/*.apk 
